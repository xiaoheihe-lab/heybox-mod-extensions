name: PR Compliance Check

on:
  pull_request:
    branches:
      - master

jobs:
  compliance:
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.check.outputs.passed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed files
        id: check
        run: |
          set -e

          echo "## Detecting changed files..."
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "$CHANGED"
          echo ""

          if [ -z "$CHANGED" ]; then
            echo "✅ No files changed"
            echo "passed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          EXTS=()
          echo "## Validating changes..."

          while IFS= read -r file; do
            # Skip empty lines
            [ -z "$file" ] && continue

            if [[ "$file" == extensions/* ]]; then
              EXT_NAME=$(echo "$file" | cut -d'/' -f2)
              if [[ ! " ${EXTS[@]} " =~ " ${EXT_NAME} " ]]; then
                EXTS+=("$EXT_NAME")
              fi
            else
              echo "::error file=$file::❌ 只允许修改 extensions/<name>/ 目录下的文件"
              echo "passed=false" >> $GITHUB_OUTPUT
              echo "INTERNAL_ERROR=1" >> $GITHUB_OUTPUT
            fi
          done <<< "$CHANGED"

          if [ "${#EXTS[@]}" -gt 1 ]; then
            echo "::error::❌ 一次 PR 只能修改一个 extension，当前涉及: [${EXTS[*]}]"
            echo "passed=false" >> $GITHUB_OUTPUT
            echo "INTERNAL_ERROR=1" >> $GITHUB_OUTPUT
          fi

          if [ -z "$INTERNAL_ERROR" ]; then
            echo "✅ 合规: 仅修改了 extension [${EXTS[0]}]"
            echo "passed=true" >> $GITHUB_OUTPUT
          fi

      - name: Fail on check violation
        if: steps.check.outputs.passed == 'false'
        run: |
          echo "## ❌ PR 合规检查失败"
          echo "请联系仓库管理员或重新检查你的变更内容。"
          exit 1
